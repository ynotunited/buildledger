name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/buildledger-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/buildledger-backend:${{ github.sha }}

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/buildledger-backend:latest
            docker stop buildledger-backend || true
            docker rm   buildledger-backend || true
            docker run -d \
              --name buildledger-backend \
              --restart unless-stopped \
              -p 8000:80 \
              --env-file /opt/buildledger/.env \
              ${{ secrets.DOCKER_USERNAME }}/buildledger-backend:latest
            docker exec buildledger-backend php artisan migrate --force
            docker exec buildledger-backend php artisan config:cache
            docker exec buildledger-backend php artisan route:cache
            docker exec buildledger-backend php artisan view:cache
            docker image prune -f
