version: "3.9"

services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      API_GATEWAY_SHARED_SECRET: ${API_GATEWAY_SHARED_SECRET}
    volumes:
      - ./ops/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - edge
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://app.example.com/api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://app.example.com/api
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    expose:
      - "3000"
    networks:
      - internal

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-buildledger}
      DB_USERNAME: ${DB_USERNAME:-buildledger}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECURITY_REDIS_REQUIRED_IN_PRODUCTION: "true"
      SECURITY_API_GATEWAY_ENFORCED: "true"
      API_GATEWAY_SHARED_SECRET: ${API_GATEWAY_SHARED_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/up >/dev/null 2>&1 && wget -q -O - http://127.0.0.1/readyz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    expose:
      - "80"
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-buildledger}
      POSTGRES_USER: ${DB_USERNAME:-buildledger}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-buildledger} -d ${DB_DATABASE:-buildledger}"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "6379"
    networks:
      - internal

volumes:
  backend_storage:
  postgres_data:
  redis_data:

networks:
  edge:
  internal:
    internal: true
