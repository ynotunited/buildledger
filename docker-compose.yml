version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       buildledger
      POSTGRES_USER:     buildledger
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildledger"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Laravel Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8000:80"
    env_file:
      - ./backend/.env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST:       db
      DB_PORT:       5432
      DB_DATABASE:   buildledger
      DB_USERNAME:   buildledger
      DB_PASSWORD:   ${DB_PASSWORD:-change-me}
      MAIL_MAILER:   smtp
      MAIL_HOST:     mailpit
      MAIL_PORT:     1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null
      MAIL_FROM_ADDRESS: hello@buildledger.local
      MAIL_FROM_NAME: BuildLedger
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    volumes:
      - ./backend/storage:/var/www/html/storage

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend

  # ── Local Mail Catcher ──────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - default

volumes:
  pgdata:
